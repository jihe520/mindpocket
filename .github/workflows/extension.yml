name: Extension CI/CD

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: Publish artifacts to GitHub Release
        required: true
        default: false
        type: boolean
      release_tag:
        description: Release tag (required when create_release is true)
        required: false
        type: string
      release_name:
        description: Release name
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: apps/extension

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.9.0
          run_install: false

      - name: Install dependencies
        run: cd ../.. && pnpm install --frozen-lockfile

      - name: Build Chromium zip
        run: pnpm zip:chromium

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-chromium
          path: apps/extension/.output/*-chromium.zip
          if-no-files-found: error

      - name: Validate release inputs
        if: ${{ inputs.create_release }}
        run: |
          if [ -z "${{ inputs.release_tag }}" ]; then
            echo "release_tag is required when create_release is true"
            exit 1
          fi

      - name: Publish extension to GitHub Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.release_tag }}
          append_body: true
          generate_release_notes: true
          files: apps/extension/.output/*-chromium.zip
