# ============================================
# MindPocket Docker Compose
# ============================================

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mindpocket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mindpocket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mindpocket}
      POSTGRES_DB: ${POSTGRES_DB:-mindpocket}
    volumes:
      - mindpocket_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  mindpocket:
    image: mindpocket:latest
    container_name: mindpocket
    pull_policy: never
    build:
      context: .
      target: runner
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-mindpocket}
      DB_PASSWORD: ${DB_PASSWORD:-mindpocket}
      DB_NAME: ${DB_NAME:-mindpocket}
      DB_SSLMODE: ${DB_SSLMODE:-}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-mindpocket-local-dev-secret}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-}
      REDIS_URL: ${REDIS_URL:-}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-mindpocket}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      KV_REST_API_READ_ONLY_TOKEN: ${KV_REST_API_READ_ONLY_TOKEN:-}
      KV_REST_API_TOKEN: ${KV_REST_API_TOKEN:-}
      KV_REST_API_URL: ${KV_REST_API_URL:-}
      KV_URL: ${KV_URL:-}

  minio:
    image: minio/minio:latest
    container_name: mindpocket-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - mindpocket_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mindpocket_postgres_data:
  mindpocket_minio_data:
